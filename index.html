<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <!-- CSS von Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- #######  -->
    <title>CRUD APP</title>
  </head>
  <body>
    <h1 class="mb-5">Fitnessstudio Body test 2</h1>

    <h1 class="mt-5">Mitglied hinzufügen</h1>
    <form>
      <div class="input-container">
        <input
          id="new-name-input"
          class="form-control me-3"
          type="text"
          placeholder="Default input"
          aria-label="default input example"
        />
        <button class="btn btn-success" onclick="addMember(event)">
          Hinzufügen
        </button>
      </div>
    </form>

    <div class="d-none" id="update-section">
      <h1 class="mt-5">Mitglied bearbeiten</h1>
      <form class="edit-form">
        <input
          id="member-id"
          readonly
          class="form-control me-3 fs-4"
          type="text"
          placeholder="Default input"
          aria-label="default input example"
        />

        <input
          id="member-name"
          class="form-control me-3 fs-4"
          type="text"
          placeholder="Default input"
          aria-label="default input example"
        />

        <button class="btn btn-primary" onclick="saveUpdateUser(event)">
          Speichern
        </button>
      </form>
    </div>

    <h1 class="mt-5">Mitglieder Fitnesstudio Pumpifit</h1>
    <ul class="list-group" id="list-group"></ul>

    <!-- Eigenes JS -->
    <script src="./main.js"></script>
    <!-- ######### -->

    <!-- Popper JS von Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
