<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klick Zähler</title>
</head>

<body>

    <button id="klick">Hier klicken um zu zählen</button>
    <p id="anzeige">0</p>

    <script>
        let counter = 0; // Startwert

        function klicken() {
            counter++;  
            document.getElementById("anzeige").innerText = counter;
        }

        document.getElementById("klick").addEventListener("click", klicken);
    </script>

</body>

</html>
